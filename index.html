<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misurazione Visus</title>

  <style>
    :root {
      --bg-color: white;
      --text-color: black;
      --button-bg: rgba(255,255,255,0.9);
      --button-text: black;
      --button-border: #0078ff;
      --info-bg: rgba(255,255,255,0.85);
    }

    body.negative {
      --bg-color: black;
      --text-color: white;
      --button-bg: rgba(30,30,30,0.9);
      --button-text: white;
      --button-border: #00d9ff;
      --info-bg: rgba(30,30,30,0.85);
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    #lettera {
      font-size: 250pt;
      font-weight: bold;
      user-select: none;
      text-align: center;
      line-height: 1;
    }

    #sizeDisplay {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      font-weight: bold;
      padding: 12px 18px;
      border-radius: 12px;
      border: 3px solid var(--button-border);
      background-color: var(--info-bg);
      color: var(--text-color);
    }

    .controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: grid;
      grid-template-columns: 80px 80px 80px;
      grid-template-rows: 80px 80px 80px;
      gap: 8px;
    }

    button {
      width: 80px;
      height: 80px;
      font-size: 34px;
      font-weight: bold;
      border-radius: 16px;
      border: 3px solid var(--button-border);
      background-color: var(--button-bg);
      color: var(--button-text);
      cursor: pointer;
      transition: transform 0.15s, background-color 0.3s, color 0.3s;
    }

    button:hover {
      transform: scale(1.08);
    }

    button:active {
      transform: scale(0.95);
    }

    .empty {
      visibility: hidden;
    }

    #toggleMode {
      font-size: 24px;
    }
  </style>
</head>
<body>

  <div id="sizeDisplay">Grandezza: 250 pt</div>

  <div id="lettera">E</div>

  <!-- Layout joystick -->
  <div class="controls">
    <div class="empty"></div>
    <button id="increaseSize" title="Freccia Su">↑</button>
    <div class="empty"></div>

    <button id="toggleMode" title="Freccia Sinistra">◐</button>
    <div class="empty"></div>
    <button id="nextLetter" title="Freccia Destra">→</button>

    <div class="empty"></div>
    <button id="decreaseSize" title="Freccia Giù">↓</button>
    <div class="empty"></div>
  </div>

  <script>
    const lettere = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let dimensione = 250;

    const letteraEl = document.getElementById("lettera");
    const nextLetterBtn = document.getElementById("nextLetter");
    const decreaseSizeBtn = document.getElementById("decreaseSize");
    const increaseSizeBtn = document.getElementById("increaseSize");
    const toggleModeBtn = document.getElementById("toggleMode");
    const sizeDisplay = document.getElementById("sizeDisplay");

    function aggiornaDisplay() {
      letteraEl.style.fontSize = dimensione + "pt";
      sizeDisplay.textContent = "Grandezza: " + dimensione + " pt";
    }

    function letteraCasuale() {
      let nuova;
      do {
        nuova = lettere[Math.floor(Math.random() * lettere.length)];
      } while (nuova === letteraEl.textContent);
      letteraEl.textContent = nuova;
    }

    function diminuisciDimensione() {
      if (dimensione > 5) {
        dimensione -= 5;
        aggiornaDisplay();
      }
    }

    function aumentaDimensione() {
      dimensione += 5;
      aggiornaDisplay();
    }

    function toggleModalita() {
      document.body.classList.toggle("negative");
    }

    // Click mouse
    nextLetterBtn.addEventListener("click", letteraCasuale);
    decreaseSizeBtn.addEventListener("click", diminuisciDimensione);
    increaseSizeBtn.addEventListener("click", aumentaDimensione);
    toggleModeBtn.addEventListener("click", toggleModalita);

    // Tastiera
    document.addEventListener("keydown", function(event) {
      switch(event.key) {
        case "ArrowRight":
          letteraCasuale();
          break;
        case "ArrowDown":
          diminuisciDimensione();
          break;
        case "ArrowUp":
          aumentaDimensione();
          break;
        case "ArrowLeft":
          toggleModalita();
          break;
      }
    });

    // Inizializzazione
    letteraCasuale();
    aggiornaDisplay();
  </script>

</body>
</html>
